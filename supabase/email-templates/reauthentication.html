<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Confirm it's you</title>
</head>
<body style="margin:0; padding:0; background-color:#EFE8E0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#EFE8E0;">
    <tr>
      <td align="center" style="padding: 48px 16px;">
        <table role="presentation" width="480" cellpadding="0" cellspacing="0" style="max-width:480px; width:100%; background-color:#FAF1F2; border-radius:6px; overflow:hidden; border:1px solid #E9E2D6;">

          <!-- Header -->
          <tr>
            <td align="center" style="background-color:#0B0F14; padding: 40px 24px 32px;">
              <div style="font-family: Georgia, 'Times New Roman', serif; font-size:26px; letter-spacing:7px; color:#D4AF37; font-weight:400;">
                LUMA
              </div>
              <div style="margin-top:10px; font-size:10px; letter-spacing:2.5px; text-transform:uppercase; color:rgba(250,241,242,0.55);">
                Curated Stays &middot; Extraordinary Moments
              </div>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding: 40px 40px 8px;">
              <h1 style="margin:0 0 16px; font-family: Georgia, 'Times New Roman', serif; font-weight:400; font-size:23px; color:#0B0F14;">
                Confirm it&rsquo;s you
              </h1>
              <p style="margin:0 0 28px; font-size:14px; line-height:23px; color:#4a423c;">
                Enter this code to confirm your identity and continue.
              </p>

              <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                  <td align="center" style="border-radius:3px; background-color:#0B0F14; padding:20px 24px;">
                    <span style="font-family: Georgia, 'Times New Roman', serif; font-size:32px; letter-spacing:10px; color:#D4AF37;">
                      {{ .Token }}
                    </span>
                  </td>
                </tr>
              </table>

              <p style="margin:32px 0 0; font-size:12px; line-height:19px; color:#9a8f85;">
                This code expires shortly. If you didn&rsquo;t request it, you can safely ignore this email.
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding: 28px 40px 36px; border-top:1px solid #E9E2D6;">
              <p style="margin:0; font-size:11px; letter-spacing:0.4px; color:#a39a90;">
                LUMA &middot; Curated Stays. Extraordinary Moments.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
